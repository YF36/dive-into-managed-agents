<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="indigoGM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="emeraldGM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="skyGM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="violetGM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amberGM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrMD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrMR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Many Brains × Many Hands · 多 agent 协作</text>
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#64748b">Context 相互隔离  ·  Sandbox 文件系统共享  ·  每个子 agent 只回传摘要</text>

  <!-- Coordinator -->
  <g filter="url(#softM)">
    <rect x="440" y="110" width="320" height="110" rx="14" fill="url(#indigoGM)"/>
  </g>
  <text x="600" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">🧠 Coordinator Agent</text>
  <text x="600" y="160" text-anchor="middle" font-size="11" fill="#e0e7ff">（父级 context）</text>
  <text x="600" y="184" text-anchor="middle" font-size="10.5" fill="#e0e7ff">声明 callable_agents</text>
  <text x="600" y="200" text-anchor="middle" font-size="10.5" fill="#e0e7ff">拆任务 · 调度委派 · 汇总结果</text>

  <!-- Delegation arrows -->
  <path d="M 500 222 C 500 260, 260 260, 240 300" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrMD)"/>
  <path d="M 600 222 L 600 300" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrMD)"/>
  <path d="M 700 222 C 700 260, 940 260, 960 300" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrMD)"/>
  <text x="370" y="265" font-size="10" fill="#6366f1" font-style="italic">agent.delegation</text>
  <text x="1020" y="265" text-anchor="end" font-size="10" fill="#6366f1" font-style="italic">+ thread_id</text>

  <!-- Sub-agents (3 threads) -->
  <g filter="url(#softM)">
    <rect x="80" y="310" width="320" height="170" rx="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  </g>
  <rect x="80" y="310" width="320" height="32" rx="14" fill="url(#violetGM)"/>
  <rect x="80" y="326" width="320" height="16" fill="url(#violetGM)"/>
  <text x="240" y="331" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Researcher · thread-1</text>

  <text x="100" y="366" font-size="11" fill="#64748b">独立 context（隔离）</text>
  <g>
    <rect x="100" y="378" width="280" height="36" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="110" y="400" font-size="10.5" fill="#6d28d9">system prompt：调研员 · tools: web, read</text>
  </g>
  <g>
    <rect x="100" y="420" width="280" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="110" y="437" font-size="10" fill="#475569">agent.message · agent.tool_use × N</text>
  </g>
  <g>
    <rect x="100" y="450" width="280" height="22" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="110" y="466" font-size="10" fill="#047857">→ 只回传 summary 给父级</text>
  </g>

  <g filter="url(#softM)">
    <rect x="440" y="310" width="320" height="170" rx="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  </g>
  <rect x="440" y="310" width="320" height="32" rx="14" fill="url(#violetGM)"/>
  <rect x="440" y="326" width="320" height="16" fill="url(#violetGM)"/>
  <text x="600" y="331" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Writer · thread-2</text>

  <text x="460" y="366" font-size="11" fill="#64748b">独立 context（隔离）</text>
  <g>
    <rect x="460" y="378" width="280" height="36" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="470" y="400" font-size="10.5" fill="#6d28d9">system prompt：作家 · tools: edit, write</text>
  </g>
  <g>
    <rect x="460" y="420" width="280" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="470" y="437" font-size="10" fill="#475569">agent.message · agent.tool_use × N</text>
  </g>
  <g>
    <rect x="460" y="450" width="280" height="22" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="470" y="466" font-size="10" fill="#047857">→ 只回传 summary 给父级</text>
  </g>

  <g filter="url(#softM)">
    <rect x="800" y="310" width="320" height="170" rx="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  </g>
  <rect x="800" y="310" width="320" height="32" rx="14" fill="url(#violetGM)"/>
  <rect x="800" y="326" width="320" height="16" fill="url(#violetGM)"/>
  <text x="960" y="331" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Reviewer · thread-3</text>

  <text x="820" y="366" font-size="11" fill="#64748b">独立 context（隔离）</text>
  <g>
    <rect x="820" y="378" width="280" height="36" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="830" y="400" font-size="10.5" fill="#6d28d9">system prompt：审稿人 · tools: read, grep</text>
  </g>
  <g>
    <rect x="820" y="420" width="280" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="830" y="437" font-size="10" fill="#475569">agent.message · agent.tool_use × N</text>
  </g>
  <g>
    <rect x="820" y="450" width="280" height="22" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="830" y="466" font-size="10" fill="#047857">→ 只回传 summary 给父级</text>
  </g>

  <!-- Summary return arrows -->
  <path d="M 300 482 C 400 540, 440 240, 510 222" stroke="#10b981" stroke-width="1.6" fill="none" marker-end="url(#arrMR)" stroke-dasharray="4,3"/>
  <path d="M 600 482 C 600 540, 600 540, 600 222" stroke="none" fill="none"/>
  <path d="M 900 482 C 800 540, 760 240, 690 222" stroke="#10b981" stroke-width="1.6" fill="none" marker-end="url(#arrMR)" stroke-dasharray="4,3"/>
  <text x="440" y="540" font-size="10" fill="#059669" font-style="italic">delegation_result · 摘要回传</text>

  <!-- Shared sandbox -->
  <g filter="url(#softM)">
    <rect x="80" y="560" width="1040" height="170" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
  </g>
  <text x="600" y="592" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">🛠️ 共享 Sandbox Container · 同一个文件系统</text>
  <text x="600" y="612" text-anchor="middle" font-size="11" fill="#92400e">所有 agent thread 读写同一份工作区  ·  文件是它们之间唯一共享的「状态」</text>

  <g>
    <rect x="110" y="634" width="200" height="80" rx="10" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="210" y="662" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/workspace/research/</text>
    <text x="210" y="680" text-anchor="middle" font-size="10" fill="#64748b">Researcher 写入</text>
    <text x="210" y="696" text-anchor="middle" font-size="10" fill="#64748b">Writer 读取</text>
  </g>
  <g>
    <rect x="330" y="634" width="200" height="80" rx="10" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="430" y="662" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/workspace/draft.md</text>
    <text x="430" y="680" text-anchor="middle" font-size="10" fill="#64748b">Writer 写入</text>
    <text x="430" y="696" text-anchor="middle" font-size="10" fill="#64748b">Reviewer 读取</text>
  </g>
  <g>
    <rect x="550" y="634" width="200" height="80" rx="10" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="650" y="662" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/workspace/review.md</text>
    <text x="650" y="680" text-anchor="middle" font-size="10" fill="#64748b">Reviewer 输出</text>
    <text x="650" y="696" text-anchor="middle" font-size="10" fill="#64748b">Writer 修订</text>
  </g>
  <g>
    <rect x="770" y="634" width="330" height="80" rx="10" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="935" y="662" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">不共享的东西</text>
    <text x="935" y="680" text-anchor="middle" font-size="10" fill="#64748b">context window · tool 权限 · system prompt</text>
    <text x="935" y="696" text-anchor="middle" font-size="10" fill="#64748b">—— 每个 agent 独有</text>
  </g>
</svg>
