<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Managed Agents · 系统总览</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#64748b">「大脑」—— 无状态编排  ×  「双手」—— 沙箱容器  ×  三件外部化资源</text>

  <!-- Layer 1: Client -->
  <g filter="url(#soft)">
    <rect x="360" y="110" width="480" height="70" rx="14" fill="url(#slateGrad)" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <text x="600" y="140" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">客户端应用</text>
  <text x="600" y="162" text-anchor="middle" font-size="12" fill="#64748b">IDE 副驾  ·  Web Chatbot  ·  Slack Bot  ·  Cron / Webhook  ·  SaaS</text>

  <!-- Arrow -->
  <path d="M 600 186 L 600 220" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="615" y="208" font-size="11" fill="#64748b">HTTPS + SSE</text>

  <!-- Layer 2: Control Plane -->
  <g filter="url(#soft)">
    <rect x="200" y="230" width="800" height="66" rx="14" fill="url(#indigoGrad)"/>
  </g>
  <text x="600" y="258" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">控制面  ·  Control Plane</text>
  <text x="600" y="280" text-anchor="middle" font-size="11.5" fill="#e0e7ff">Agent / Environment / Session / Vault 资源 CRUD   ·   事件收发   ·   认证 · 配额</text>

  <!-- Arrow -->
  <path d="M 600 302 L 600 336" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Layer 3: Orchestration (Brain) -->
  <g filter="url(#soft)">
    <rect x="120" y="345" width="960" height="150" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  </g>
  <text x="160" y="378" font-size="12" font-weight="600" fill="#6366f1">🧠 编排层 · 大脑</text>
  <text x="160" y="396" font-size="11" fill="#64748b">无状态  ·  水平可扩展</text>

  <!-- Harness workers -->
  <g filter="url(#soft)">
    <rect x="320" y="370" width="170" height="100" rx="12" fill="url(#indigoGrad)"/>
  </g>
  <text x="405" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Harness Worker</text>
  <text x="405" y="425" text-anchor="middle" font-size="10.5" fill="#e0e7ff">拼 context → 调模型</text>
  <text x="405" y="442" text-anchor="middle" font-size="10.5" fill="#e0e7ff">解析 tool_use</text>
  <text x="405" y="459" text-anchor="middle" font-size="10.5" fill="#e0e7ff">写回事件日志</text>

  <g filter="url(#soft)">
    <rect x="520" y="370" width="170" height="100" rx="12" fill="url(#indigoGrad)" opacity="0.88"/>
  </g>
  <text x="605" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Harness Worker</text>
  <text x="605" y="425" text-anchor="middle" font-size="10.5" fill="#e0e7ff">compaction</text>
  <text x="605" y="442" text-anchor="middle" font-size="10.5" fill="#e0e7ff">prompt caching</text>
  <text x="605" y="459" text-anchor="middle" font-size="10.5" fill="#e0e7ff">thinking 复用</text>

  <g filter="url(#soft)">
    <rect x="720" y="370" width="170" height="100" rx="12" fill="url(#indigoGrad)" opacity="0.76"/>
  </g>
  <text x="805" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Harness Worker</text>
  <text x="805" y="425" text-anchor="middle" font-size="10.5" fill="#e0e7ff">...</text>
  <text x="805" y="445" text-anchor="middle" font-size="10.5" fill="#e0e7ff">Scheduler</text>
  <text x="805" y="462" text-anchor="middle" font-size="10.5" fill="#e0e7ff">分配 pending work</text>

  <text x="1035" y="430" text-anchor="end" font-size="11" fill="#94a3b8" font-style="italic">execute(name, input) →</text>

  <!-- Arrows to bottom -->
  <path d="M 300 500 L 220 558" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M 900 500 L 980 558" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Layer 4a: State Layer -->
  <g filter="url(#soft)">
    <rect x="60" y="555" width="470" height="170" rx="16" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  </g>
  <text x="100" y="588" font-size="12" font-weight="600" fill="#059669">💾 状态层 · 外部化</text>
  <text x="100" y="606" font-size="11" fill="#64748b">Durable · 永不丢失</text>

  <g>
    <rect x="85" y="624" width="140" height="80" rx="10" fill="url(#emeraldGrad)"/>
    <text x="155" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Event Log</text>
    <text x="155" y="672" text-anchor="middle" font-size="10" fill="#d1fae5">append-only</text>
    <text x="155" y="688" text-anchor="middle" font-size="10" fill="#d1fae5">session 事件序列</text>
  </g>
  <g>
    <rect x="235" y="624" width="140" height="80" rx="10" fill="url(#roseGrad)"/>
    <text x="305" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Vault</text>
    <text x="305" y="672" text-anchor="middle" font-size="10" fill="#ffe4e6">OAuth tokens</text>
    <text x="305" y="688" text-anchor="middle" font-size="10" fill="#ffe4e6">Claude 永远读不到</text>
  </g>
  <g>
    <rect x="385" y="624" width="130" height="80" rx="10" fill="url(#skyGrad)"/>
    <text x="450" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Checkpoints</text>
    <text x="450" y="672" text-anchor="middle" font-size="10" fill="#e0f2fe">容器文件系统</text>
    <text x="450" y="688" text-anchor="middle" font-size="10" fill="#e0f2fe">快照 / files</text>
  </g>

  <!-- Layer 4b: Sandbox Layer -->
  <g filter="url(#soft)">
    <rect x="670" y="555" width="470" height="170" rx="16" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
  </g>
  <text x="710" y="588" font-size="12" font-weight="600" fill="#d97706">🛠️ 沙箱层 · 双手</text>
  <text x="710" y="606" font-size="11" fill="#64748b">可重建  ·  失败不拖垮 session</text>

  <g>
    <rect x="695" y="624" width="200" height="80" rx="10" fill="url(#amberGrad)"/>
    <text x="795" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Container Pool</text>
    <text x="795" y="672" text-anchor="middle" font-size="10" fill="#fef3c7">bash · file ops · code</text>
    <text x="795" y="688" text-anchor="middle" font-size="10" fill="#fef3c7">每 session 一个容器实例</text>
  </g>
  <g>
    <rect x="905" y="624" width="220" height="80" rx="10" fill="url(#amberGrad)" opacity="0.85"/>
    <text x="1015" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">外置 Proxy</text>
    <text x="1015" y="672" text-anchor="middle" font-size="10" fill="#fef3c7">Git / MCP 凭证注入</text>
    <text x="1015" y="688" text-anchor="middle" font-size="10" fill="#fef3c7">egress 网络控制</text>
  </g>

  <!-- Resource legend top-right badges -->
  <g transform="translate(60,110)">
    <rect x="0" y="0" width="230" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="600" fill="#475569">四个核心资源</text>
    <circle cx="18" cy="36" r="4" fill="#6366f1"/>
    <text x="28" y="40" font-size="10.5" fill="#475569">Agent （versioned config）</text>
    <circle cx="18" cy="52" r="4" fill="#0ea5e9"/>
    <text x="28" y="56" font-size="10.5" fill="#475569">Environment （容器模板）</text>
    <circle cx="140" cy="36" r="4" fill="#10b981"/>
    <text x="150" y="40" font-size="10.5" fill="#475569">Session （运行实例）</text>
    <circle cx="140" cy="52" r="4" fill="#f43f5e"/>
    <text x="150" y="56" font-size="10.5" fill="#475569">Vault （凭证仓）</text>
  </g>

  <g transform="translate(910,110)">
    <rect x="0" y="0" width="230" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="600" fill="#475569">核心解耦</text>
    <text x="12" y="38" font-size="10.5" fill="#475569">① Harness 搬出容器</text>
    <text x="12" y="54" font-size="10.5" fill="#475569">② Session 成为外部日志</text>
    <text x="12" y="68" font-size="10.5" fill="#475569">③ 凭证永不进沙箱</text>
  </g>

</svg>
