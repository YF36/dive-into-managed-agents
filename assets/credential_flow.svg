<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="roseGC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="amberGC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="emeraldGC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="indigoGC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="sandboxG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="softC" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrCR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e"/>
    </marker>
    <marker id="arrCG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#fecaca" stroke-width="1.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">凭证隔离 · 物理级边界</text>
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#64748b">Claude 能接触的世界里不存在凭证  ——  prompt injection 拿不到不存在的东西</text>

  <!-- Sandbox (center) -->
  <g filter="url(#softC)">
    <rect x="380" y="130" width="480" height="380" rx="18" fill="url(#sandboxG)" stroke="#f59e0b" stroke-width="2.5"/>
  </g>
  <text x="620" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">🛠️ Sandbox Container</text>
  <text x="620" y="182" text-anchor="middle" font-size="11" fill="#92400e">Claude 写的代码跑在这里</text>

  <!-- Inside sandbox: what Claude can see -->
  <g>
    <rect x="420" y="210" width="180" height="60" rx="10" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="510" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">bash / file ops</text>
    <text x="510" y="252" text-anchor="middle" font-size="10" fill="#64748b">Claude 可用</text>
  </g>
  <g>
    <rect x="640" y="210" width="180" height="60" rx="10" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="730" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">workspace files</text>
    <text x="730" y="252" text-anchor="middle" font-size="10" fill="#64748b">git 仓库 · 产物</text>
  </g>

  <!-- Claude agent inside -->
  <g>
    <rect x="500" y="290" width="240" height="80" rx="12" fill="url(#indigoGC)"/>
    <text x="620" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">🧠 Claude （agent code）</text>
    <text x="620" y="340" text-anchor="middle" font-size="11" fill="#e0e7ff">读写 fs · 跑 bash · 发 HTTP</text>
    <text x="620" y="358" text-anchor="middle" font-size="11" fill="#e0e7ff" font-style="italic">但永远读不到 token</text>
  </g>

  <!-- Forbidden zone inside sandbox -->
  <g>
    <rect x="440" y="400" width="360" height="80" rx="10" fill="url(#hatch)" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="620" y="427" text-anchor="middle" font-size="12" font-weight="600" fill="#be123c">✗ 这里没有凭证</text>
    <text x="620" y="447" text-anchor="middle" font-size="10.5" fill="#be123c">环境变量设不了 · secrets 文件不会出现</text>
    <text x="620" y="463" text-anchor="middle" font-size="10.5" fill="#be123c">agent system prompt 里也不要放 API key（反模式）</text>
  </g>

  <!-- Vault (left, outside) -->
  <g filter="url(#softC)">
    <rect x="50" y="140" width="260" height="240" rx="14" fill="#ffffff" stroke="#f43f5e" stroke-width="2"/>
  </g>
  <g>
    <rect x="50" y="140" width="260" height="40" rx="14" fill="url(#roseGC)"/>
    <clipPath id="topClip"><rect x="50" y="140" width="260" height="20"/></clipPath>
    <rect x="50" y="160" width="260" height="20" fill="url(#roseGC)"/>
  </g>
  <text x="180" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">🔐 Vault</text>

  <g>
    <rect x="70" y="195" width="220" height="46" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
    <text x="85" y="214" font-size="11" font-weight="600" fill="#be123c">OAuth tokens</text>
    <text x="85" y="232" font-size="10" fill="#9f1239">MCP 服务器认证  ·  auto refresh</text>
  </g>
  <g>
    <rect x="70" y="250" width="220" height="46" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
    <text x="85" y="269" font-size="11" font-weight="600" fill="#be123c">Git authorization</text>
    <text x="85" y="287" font-size="10" fill="#9f1239">clone / pull / push 专用</text>
  </g>
  <g>
    <rect x="70" y="305" width="220" height="46" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
    <text x="85" y="324" font-size="11" font-weight="600" fill="#be123c">API keys</text>
    <text x="85" y="342" font-size="10" fill="#9f1239">按 vault_ids 挂载到 session</text>
  </g>
  <text x="180" y="372" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">独立资源 · 与 Agent 解耦</text>

  <!-- Proxies (between vault and sandbox) -->
  <g filter="url(#softC)">
    <rect x="340" y="540" width="520" height="180" rx="14" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  </g>
  <text x="600" y="572" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">出站代理  ·  Egress Proxy</text>
  <text x="600" y="590" text-anchor="middle" font-size="11" fill="#64748b">请求离开 sandbox 后，由 proxy 从 vault 取 token 注入</text>

  <g>
    <rect x="370" y="610" width="230" height="90" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="485" y="636" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Git Proxy</text>
    <text x="485" y="656" text-anchor="middle" font-size="10.5" fill="#047857">git clone → 初始化时注入 token</text>
    <text x="485" y="672" text-anchor="middle" font-size="10.5" fill="#047857">git push → proxy 续上 authorization</text>
    <text x="485" y="690" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Resource-bundled auth</text>
  </g>
  <g>
    <rect x="615" y="610" width="230" height="90" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="730" y="636" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">MCP Proxy</text>
    <text x="730" y="656" text-anchor="middle" font-size="10.5" fill="#047857">MCP tool call → proxy 拿 OAuth</text>
    <text x="730" y="672" text-anchor="middle" font-size="10.5" fill="#047857">刷新 refresh token · 失败回调</text>
    <text x="730" y="690" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Vault-stored credentials</text>
  </g>

  <!-- Host-side custom tool (right) -->
  <g filter="url(#softC)">
    <rect x="890" y="140" width="260" height="240" rx="14" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  </g>
  <g>
    <rect x="890" y="140" width="260" height="40" rx="14" fill="url(#indigoGC)"/>
    <rect x="890" y="160" width="260" height="20" fill="url(#indigoGC)"/>
  </g>
  <text x="1020" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">🖥️ Host · 客户端侧</text>

  <g>
    <rect x="910" y="200" width="220" height="60" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="1020" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">Orchestrator</text>
    <text x="1020" y="242" text-anchor="middle" font-size="10" fill="#475569">持有 API key · 执行 custom tool</text>
  </g>
  <g>
    <rect x="910" y="272" width="220" height="50" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="1020" y="293" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">非 MCP API · CLI</text>
    <text x="1020" y="310" text-anchor="middle" font-size="10" fill="#475569">带密钥的任何外部服务</text>
  </g>
  <text x="1020" y="346" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">密钥始终在 host 端</text>
  <text x="1020" y="362" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">容器端看不到</text>

  <!-- Arrows -->
  <!-- Vault → Git Proxy -->
  <path d="M 180 382 C 180 470, 350 480, 410 608" stroke="#f43f5e" stroke-width="1.8" fill="none" marker-end="url(#arrCR)" stroke-dasharray="4,3"/>
  <text x="225" y="458" font-size="10" fill="#f43f5e" font-style="italic">注入 token</text>
  <text x="225" y="472" font-size="10" fill="#f43f5e" font-style="italic">（绕过 sandbox）</text>

  <!-- Vault → MCP Proxy -->
  <path d="M 280 382 C 320 480, 600 490, 690 608" stroke="#f43f5e" stroke-width="1.8" fill="none" marker-end="url(#arrCR)" stroke-dasharray="4,3"/>

  <!-- Sandbox outbound → Git Proxy -->
  <path d="M 480 510 L 480 610" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrCG)"/>
  <text x="490" y="550" font-size="10" fill="#10b981">git ops</text>
  <text x="490" y="564" font-size="10" fill="#10b981">（无凭证）</text>

  <!-- Sandbox outbound → MCP Proxy -->
  <path d="M 730 510 L 730 610" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrCG)"/>
  <text x="740" y="550" font-size="10" fill="#10b981">MCP request</text>
  <text x="740" y="564" font-size="10" fill="#10b981">（无凭证）</text>

  <!-- Sandbox ↔ Host custom tool -->
  <path d="M 860 310 L 890 260" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arrC)"/>
  <text x="862" y="278" font-size="10" fill="#475569">agent.custom_tool_use</text>
  <path d="M 890 350 L 860 370" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arrC)"/>
  <text x="862" y="390" font-size="10" fill="#475569">user.custom_tool_result</text>
</svg>
