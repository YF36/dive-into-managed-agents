<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="ctrlG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="orchG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="stateG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="sbxG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="indigoGL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="emeraldGL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="skyGL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="amberGL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">四层架构 · 职责与边界</text>
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#64748b">每一层都有"做的事"和"明确不做的事"  ·  层间接口极简</text>

  <!-- Layer 1: Control Plane -->
  <g filter="url(#softL)">
    <rect x="60" y="100" width="1080" height="130" rx="14" fill="url(#ctrlG)" stroke="#c7d2fe" stroke-width="1.5"/>
  </g>
  <rect x="60" y="100" width="6" height="130" fill="url(#indigoGL)" rx="3"/>
  <text x="85" y="128" font-size="12" font-weight="700" fill="#4f46e5">控制面</text>
  <text x="85" y="148" font-size="14" font-weight="700" fill="#0f172a">Control Plane</text>
  <text x="85" y="170" font-size="11" fill="#64748b">客户端入口</text>

  <g>
    <rect x="220" y="125" width="150" height="80" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="295" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">资源 CRUD</text>
    <text x="295" y="170" text-anchor="middle" font-size="10" fill="#64748b">Agent · Env</text>
    <text x="295" y="184" text-anchor="middle" font-size="10" fill="#64748b">Session · Vault</text>
  </g>
  <g>
    <rect x="385" y="125" width="150" height="80" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="460" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">事件 API</text>
    <text x="460" y="170" text-anchor="middle" font-size="10" fill="#64748b">events/stream (SSE)</text>
    <text x="460" y="184" text-anchor="middle" font-size="10" fill="#64748b">events (list · send)</text>
  </g>
  <g>
    <rect x="550" y="125" width="150" height="80" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="625" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">认证 / 配额</text>
    <text x="625" y="170" text-anchor="middle" font-size="10" fill="#64748b">API key · org</text>
    <text x="625" y="184" text-anchor="middle" font-size="10" fill="#64748b">rate limit</text>
  </g>
  <g>
    <rect x="715" y="125" width="150" height="80" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="790" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Files API</text>
    <text x="790" y="170" text-anchor="middle" font-size="10" fill="#64748b">scope_id 输出产物</text>
    <text x="790" y="184" text-anchor="middle" font-size="10" fill="#64748b">上传 · 下载</text>
  </g>
  <text x="895" y="148" font-size="11" font-weight="600" fill="#be123c">✗ 不做</text>
  <text x="895" y="168" font-size="10.5" fill="#64748b">• 跑 agent loop</text>
  <text x="895" y="184" font-size="10.5" fill="#64748b">• 执行工具</text>
  <text x="895" y="200" font-size="10.5" fill="#64748b">• 存大文件内容</text>

  <!-- Interface arrow -->
  <path d="M 600 232 L 600 250" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrL)"/>
  <text x="614" y="246" font-size="10" fill="#64748b" font-style="italic">内部 RPC</text>

  <!-- Layer 2: Orchestration -->
  <g filter="url(#softL)">
    <rect x="60" y="258" width="1080" height="130" rx="14" fill="url(#orchG)" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <rect x="60" y="258" width="6" height="130" fill="url(#emeraldGL)" rx="3"/>
  <text x="85" y="286" font-size="12" font-weight="700" fill="#059669">编排层</text>
  <text x="85" y="306" font-size="14" font-weight="700" fill="#0f172a">Orchestration</text>
  <text x="85" y="326" font-size="11" fill="#64748b">大脑 · 无状态</text>

  <g>
    <rect x="220" y="283" width="170" height="80" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="305" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Harness Worker 池</text>
    <text x="305" y="328" text-anchor="middle" font-size="10" fill="#64748b">agent loop · tool 路由</text>
    <text x="305" y="342" text-anchor="middle" font-size="10" fill="#64748b">compaction · caching</text>
  </g>
  <g>
    <rect x="405" y="283" width="170" height="80" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="490" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Scheduler</text>
    <text x="490" y="328" text-anchor="middle" font-size="10" fill="#64748b">pending work 分发</text>
    <text x="490" y="342" text-anchor="middle" font-size="10" fill="#64748b">rescheduling</text>
  </g>
  <g>
    <rect x="590" y="283" width="170" height="80" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="675" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">模型网关</text>
    <text x="675" y="328" text-anchor="middle" font-size="10" fill="#64748b">Claude 推理调用</text>
    <text x="675" y="342" text-anchor="middle" font-size="10" fill="#64748b">thinking 复用</text>
  </g>
  <g>
    <rect x="775" y="283" width="100" height="80" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="825" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Grader</text>
    <text x="825" y="335" text-anchor="middle" font-size="10" fill="#64748b">独立 context</text>
    <text x="825" y="349" text-anchor="middle" font-size="10" fill="#64748b">(research)</text>
  </g>
  <text x="895" y="306" font-size="11" font-weight="600" fill="#be123c">✗ 不做</text>
  <text x="895" y="326" font-size="10.5" fill="#64748b">• 持久化任何状态</text>
  <text x="895" y="342" font-size="10.5" fill="#64748b">• 持有凭证</text>
  <text x="895" y="358" font-size="10.5" fill="#64748b">• 存业务文件</text>

  <!-- Interface arrows -->
  <path d="M 400 390 L 320 420" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrL)"/>
  <text x="255" y="412" font-size="10" fill="#64748b" font-style="italic">getEvents()</text>
  <text x="255" y="426" font-size="10" fill="#64748b" font-style="italic">append()</text>

  <path d="M 800 390 L 880 420" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrL)"/>
  <text x="895" y="412" font-size="10" fill="#64748b" font-style="italic">execute(name, input)</text>
  <text x="895" y="426" font-size="10" fill="#64748b" font-style="italic">→ string</text>

  <!-- Layer 3: State -->
  <g filter="url(#softL)">
    <rect x="60" y="430" width="530" height="160" rx="14" fill="url(#stateG)" stroke="#7dd3fc" stroke-width="1.5"/>
  </g>
  <rect x="60" y="430" width="6" height="160" fill="url(#skyGL)" rx="3"/>
  <text x="85" y="458" font-size="12" font-weight="700" fill="#0369a1">状态层</text>
  <text x="85" y="478" font-size="14" font-weight="700" fill="#0f172a">State</text>
  <text x="85" y="498" font-size="11" fill="#64748b">外部化 · Durable</text>

  <g>
    <rect x="210" y="448" width="110" height="60" rx="8" fill="#ffffff" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="265" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Event Store</text>
    <text x="265" y="490" text-anchor="middle" font-size="9" fill="#64748b">append-only</text>
  </g>
  <g>
    <rect x="335" y="448" width="110" height="60" rx="8" fill="#ffffff" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="390" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Vault</text>
    <text x="390" y="490" text-anchor="middle" font-size="9" fill="#64748b">OAuth · secrets</text>
  </g>
  <g>
    <rect x="460" y="448" width="120" height="60" rx="8" fill="#ffffff" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="520" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Checkpoint</text>
    <text x="520" y="490" text-anchor="middle" font-size="9" fill="#64748b">容器 FS 快照</text>
  </g>
  <g>
    <rect x="210" y="516" width="150" height="58" rx="8" fill="#ffffff" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="285" y="540" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Object Store</text>
    <text x="285" y="556" text-anchor="middle" font-size="9" fill="#64748b">files · blobs</text>
  </g>
  <g>
    <rect x="375" y="516" width="205" height="58" rx="8" fill="#ffffff" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="478" y="540" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Memory Store (research)</text>
    <text x="478" y="556" text-anchor="middle" font-size="9" fill="#64748b">跨 session 的持久记忆</text>
  </g>

  <!-- Layer 4: Sandbox -->
  <g filter="url(#softL)">
    <rect x="610" y="430" width="530" height="160" rx="14" fill="url(#sbxG)" stroke="#fcd34d" stroke-width="1.5"/>
  </g>
  <rect x="610" y="430" width="6" height="160" fill="url(#amberGL)" rx="3"/>
  <text x="635" y="458" font-size="12" font-weight="700" fill="#d97706">沙箱层</text>
  <text x="635" y="478" font-size="14" font-weight="700" fill="#0f172a">Sandbox</text>
  <text x="635" y="498" font-size="11" fill="#64748b">双手 · 可重建</text>

  <g>
    <rect x="750" y="448" width="150" height="60" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="825" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Container Pool</text>
    <text x="825" y="490" text-anchor="middle" font-size="9" fill="#64748b">预热 · 每 session 绑一个</text>
  </g>
  <g>
    <rect x="910" y="448" width="210" height="60" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="1015" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">外置 Proxy</text>
    <text x="1015" y="490" text-anchor="middle" font-size="9" fill="#64748b">Git · MCP 凭证注入 · egress</text>
  </g>
  <g>
    <rect x="750" y="516" width="110" height="58" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="805" y="540" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">bash</text>
    <text x="805" y="556" text-anchor="middle" font-size="9" fill="#64748b">tool</text>
  </g>
  <g>
    <rect x="870" y="516" width="110" height="58" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="925" y="540" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">file ops</text>
    <text x="925" y="556" text-anchor="middle" font-size="9" fill="#64748b">read · write · edit</text>
  </g>
  <g>
    <rect x="990" y="516" width="130" height="58" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="1055" y="540" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">custom tools</text>
    <text x="1055" y="556" text-anchor="middle" font-size="9" fill="#64748b">host-side 回调</text>
  </g>

  <!-- Bottom: 核心接口总结 -->
  <g filter="url(#softL)">
    <rect x="60" y="620" width="1080" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="600" y="650" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">三个核心接口  ——  层间解耦的关键</text>

  <g>
    <rect x="100" y="670" width="310" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="120" y="692" font-size="12" font-weight="700" fill="#4f46e5">Client ↔ Control Plane</text>
    <text x="120" y="712" font-size="11" fill="#475569">REST + SSE  ·  events.stream() / send() / list()</text>
  </g>
  <g>
    <rect x="425" y="670" width="310" height="60" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="445" y="692" font-size="12" font-weight="700" fill="#059669">Harness ↔ Session</text>
    <text x="445" y="712" font-size="11" fill="#475569">getEvents(offset) → events  ·  append(event)</text>
  </g>
  <g>
    <rect x="750" y="670" width="310" height="60" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
    <text x="770" y="692" font-size="12" font-weight="700" fill="#d97706">Harness ↔ Sandbox</text>
    <text x="770" y="712" font-size="11" fill="#475569">execute(name, input) → string  （唯一接口）</text>
  </g>
</svg>
